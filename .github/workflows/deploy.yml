name: Trigger Main Repo Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger workflow in main repo
        run: |
          curl -s -X POST \
            "https://api.github.com/repos/orso081980/marina-di-concaverde/actions/workflows/deploy.yml/dispatches" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.MAIN_REPO_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d '{"ref":"main"}' \
            -w "\nHTTP %{http_code}\n" \
            | tee /tmp/gh_response.txt
          # HTTP 204 = success
          grep -q "HTTP 204" /tmp/gh_response.txt || \
            (echo "Failed to trigger deploy:" && cat /tmp/gh_response.txt && exit 1)
