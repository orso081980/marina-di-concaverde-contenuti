                type: string

  # ── Pages — one collection per language ──────────────────────────────────────
  - name: pages_it
    label: Pages (Italiano)
    type: collection
    path: content/it
    exclude: ["_nav.md", "_ui.md"]
    format: yaml-frontmatter
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: description
        label: SEO Description
        type: text
      - name: seoImage
        label: SEO Image
        type: sting
      - name: keywords
        label: SEO Keywords
        type: string
      - name: translations
        label: URL Translations
        type: object
        fields:
          - name: it
            label: IT path
            type: string
          - name: en
            label: EN path
            type: string
          - name: de
            label: DE path
            type: string
          - name: fr
            label: FR path
            type: string
      - name: hero
        label: Hero Section
        type: object
        fields:
          - name: eyebrow
            label: Eyebrow Text
            type: string
          - name: title
            label: Title
            type: string
          - name: subtitle
            label: Subtitle
            type: string
          - name: image
            label: Hero Image (single)
            type: sting
          - name: imageAlt
            label: Hero Image Alt Text
            type: string
          - name: video
            label: Hero Video URL
            type: string
          - name: gallery
            label: Gallery Images
            type: sting
            list: true
          - name: altGallery
            label: Gallery Alt Texts
            type: string
            list: true
          - name: galleryCta
            label: Gallery CTA Button
            type: object
            fields:
              - name: label
                type: string
              - name: href
                type: string
          - name: primaryCta
            label: Primary CTA Button
            type: object
            fields:
              - name: label
                type: string
              - name: href
                type: string
          - name: secondaryCta
            label: Secondary CTA Button
            type: object
            fields:
              - name: label
                type: string
              - name: href
                type: string
      - name: textBlock
        label: Text Block
        type: object
        fields:
          - name: eyebrow
            label: Eyebrow Text
            type: string
          - name: title
            label: Title
            type: string
      - name: stats
        label: Highlights / Stats
        type: object
        list: true
        fields:
          - name: value
            label: Value
            type: string
          - name: label
            label: Label
            type: string
      - name: typeGalleries
        label: Type Galleries (villa types, etc.)
        type: object
        list: true
        fields:
          - name: label
            label: Type Name
            type: string
          - name: badge
            label: Badge Text
            type: string
          - name: highlight
            label: Highlight Note
            type: string
          - name: features
            label: Features
            type: string
            list: true
          - name: images
            label: Gallery Images
            type: sting
            list: true
          - name: altGallery
            label: Image Alt Texts
            type: string
            list: true
      - name: body
        label: Page Body
        type: rich-text

