media:
  input: content/media
  output: https://cdn.marinadiconcaverde.it
  rename: safe
  categories: [image, video]

content:
  # ── Site-wide configuration ──────────────────────────────────────────────────
  - name: common
    label: Site Configuration
    type: file
    path: content/_common.md
    format: yaml-frontmatter
    fields:
      - name: publishedLocales
        label: Published Languages
        type: string
        list: true
      - name: contactEmail
        label: Contact Email
        type: string
      - name: googleMapsUrl
        label: Google Maps URL
        type: string
      - name: googleMapsEmbed
        label: Google Maps Embed URL
        type: string
      - name: elfsightId
        label: Elfsight Widget ID
        type: string
      - name: magellanoApiKey
        label: Magellano API Key
        type: string
      - name: cin
        label: CIN Code
        type: string
      - name: partners
        label: Partners
        type: object
        list: true
        fields:
          - name: name
            label: Name
            type: string
          - name: url
            label: Website URL
            type: string
          - name: img
            label: Logo
            type: sting

  # ── Navigation ───────────────────────────────────────────────────────────────
  - name: navigation
    label: Navigation
    type: group
    items:
      - name: nav_it
        label: Navigation (Italiano)
        type: file
        path: content/it/_nav.md
        format: yaml-frontmatter
        fields:
          - name: ferryHref
            label: Ferry Link URL
            type: string
          - name: navItems
            label: Navigation Items
            type: object
            list: true
            fields:
              - name: label
                type: string
              - name: href
                type: string
              - name: children
                label: Sub-items
                type: object
                list: true
                fields:
                  - name: label
                    type: string
                  - name: href
                    type: string
                  - name: icon
                    type: string
              - name: extralinks
                label: Extra Links
                type: object
                list: true
                fields:
                  - name: label
                    type: string
                  - name: href
                    type: string
                  - name: icon
                    type: string
          - name: quickLinks
            label: Quick Links
            type: object
            list: true
            fields:
              - name: icon
                type: string
              - name: label
                type: string
              - name: sublabel
                type: string
              - name: href
                type: string
              - name: image
                type: sting
          - name: bookingOptions
            label: Booking Options
            type: object
            list: true
            fields:
              - name: value
                type: string
              - name: label
                type: string

      - name: nav_en
        label: Navigation (English)
        type: file
        path: content/en/_nav.md
