media:
  input: content/media
  output: https://cdn.marinadiconcaverde.it/img
  rename: safe
  categories: [image, video]

content:
  # ── Site-wide configuration ──────────────────────────────────────────────────
  - name: common
    label: Site Configuration
    type: file
    path: content/_common.md
    format: yaml-frontmatter
    fields:
      - name: publishedLocales
        label: Published Languages
        type: string
        list: true
      - name: contactEmail
        label: Contact Email
        type: string
      - name: googleMapsUrl
        label: Google Maps URL
        type: string
      - name: googleMapsEmbed
        label: Google Maps Embed URL
        type: string
      - name: elfsightId
        label: Elfsight Widget ID
        type: string
      - name: magellanoApiKey
        label: Magellano API Key
        type: string
      - name: cin
        label: CIN Code
        type: string
      - name: partners
        label: Partners
        type: object
        list: true
        fields:
          - name: name
            label: Name
            type: string
          - name: url
            label: Website URL
            type: string
          - name: img
            label: Logo
            type: image

  # ── Navigation ───────────────────────────────────────────────────────────────
