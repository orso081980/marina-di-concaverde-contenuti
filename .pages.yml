            label: Navigation Items
            type: object
            list: true
            fields:
              - name: label
                type: string
              - name: href
                type: string
              - name: children
                label: Sub-items
                type: object
                list: true
                fields:
                  - name: label
                    type: string
                  - name: href
                    type: string
                  - name: icon
                    type: string
              - name: extralinks
                label: Extra Links
                type: object
                list: true
